server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 10m;

    # Frontend: główny adres aplikacji.
    location = / {
        try_files /index.html =404;
    }

    # Frontend: pliki statyczne i fallback dla prostych adresów.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API: przeglądarka woła /api/..., Nginx przekazuje do kontenera FastAPI.
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://api:8000/health;
    }

    location = /docs {
        proxy_pass http://api:8000/docs;
    }

    location = /openapi.json {
        proxy_pass http://api:8000/openapi.json;
    }

    location = /debug/static {
        proxy_pass http://api:8000/debug/static;
    }
}
